<!DOCTYPE html>
<html>
<head>
<title>
    My First Calculator
</title>
<link rel = "stylesheet" href = "Calculator.css">
</head>
<body>

    <div class="calculator">

    <h1>Calculator</h1>

    <p id="display">0</p>
        
    </p>

    <p>
    <button onclick="calculation+='1';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);
    ">
        1
    </button>

    <button onclick="calculation+='2';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);

    ">
        2
    </button>

    <button onclick="calculation+='3';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);

    ">
        3
    </button>

    <button onclick="calculation+=' + ';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);

    ">
        +
    </button>
    </p>

    <p>
    <button onclick="calculation+='4';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);

    ">
        4
    </button>

    <button onclick="calculation+='5';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);

    ">
        5
    </button>

    <button onclick="calculation+='6';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);
   
    ">
        6
    </button>

    <button onclick="calculation+=' - ';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);
  
    ">
        -
    </button>
    </p>

    <p>
    <button onclick="calculation+='7';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);
   
    ">
        7
    </button>

    <button onclick="calculation+='8';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);
   
    ">
        8
    </button>

    <button onclick="calculation+='9';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);

    ">
        9
    </button>

    <button onclick="calculation+=' * ';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);
    ">
        *
    </button>
    </p>

    <p>
    <button onclick="calculation+='0';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);

    ">
        0
    </button>

    <button onclick="calculation+='.';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);
    ">
        .
    </button>

    <button onclick="
        calculation = eval(calculation);
        document.getElementById('display').innerHTML = calculation;
        console.log(calculation);
    ">
        =
    </button>

    <button onclick="calculation+=' / ';
    document.getElementById('display').innerHTML = calculation;
    console.log(calculation);
    ">
        /
    </button>
    </p>

    <button onclick="calculation = '';
    document.getElementById('display').innerHTML = '0';
    console.log('Cleared');
    ">
        Clear
    </button>

    <a href="Calculator.html">Back</a>


    </div>
    

    
</body>
<script src = "Calculator.js"></script>
</html>
